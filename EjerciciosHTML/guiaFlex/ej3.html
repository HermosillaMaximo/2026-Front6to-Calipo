<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Instagram</title>
    <link rel="stylesheet" href="ej3.css">
</head>
<body>

    <header class="header">
        <span class="header-back">&#8592;</span>
        <span class="header-usuario">jeffry.kirk</span>
        <span class="header-menu">&#8942;</span>
    </header>

    <section class="perfil">
        <div class="perfil-top">
            <img class="foto-perfil" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_g3mtST1uRSsh7joJQigwpLs3FWVeN1qNGQ&s=100" alt="Foto de perfil">
            <div class="perfil-stats">
                <div class="stat">
                    <strong>87</strong>
                    <span>publicaciones</span>
                </div>
                <div class="stat">
                    <strong>1.2k</strong>
                    <span>seguidores</span>
                </div>
                <div class="stat">
                    <strong>340</strong>
                    <span>seguidos</span>
                </div>
            </div>
        </div>

        <div class="perfil-bio">
            <strong>Jeffry Kirk     </strong>
            <p>📍 Buenos Aires, Argentina</p>
            <p>Fotografía y diseño ✨</p>
        </div>

        <div class="perfil-botones">
            <button class="btn-seguir">Seguir</button>
            <button class="btn-mensaje">Mensaje</button>
        </div>
    </section>

    
    <section class="destacadas">
        <div class="historia">
            <img src="https://picsum.photos/seed/h4/60/60" alt="Historia 4">
            <span>Mascotas</span>
        </div>
    </section>

    <div class="tabs">
        <button class="tab activo">&#9783;</button>
        <button class="tab">&#10084;</button>
    </div>

    <section class="grilla">
        <img src="../imagenes/foto1.jpg" alt="Publicacion 1">
        <img src="../imagenes/foto2.jpg" alt="Publicacion 2">
        <img src="../imagenes/foto3.jpg" alt="Publicacion 3">
        <img src="../imagenes/foto4.jpg" alt="Publicacion 4">
        <img src="../imagenes/foto5.jpg" alt="Publicacion 5">
        <img src="../imagenes/foto6.jpg" alt="Publicacion 6">
        <img src="../imagenes/foto7.jpg" alt="Publicacion 7">
        <img src="../imagenes/foto8.jpg" alt="Publicacion 8">
        <img src="../imagenes/foto9.jpg" alt="Publicacion 9">
    </section>

</body>
</html>
