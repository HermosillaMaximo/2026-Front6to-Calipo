<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
</head>
<body>

    <h2>Crear cuenta</h2>

    <form>
        <div>
            <label for="nombre">Nombre:</label><br>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre">
        </div>
        <br>
        <div>
            <label for="apellido">Apellido:</label><br>
            <input type="text" id="apellido" name="apellido" placeholder="Tu apellido">
        </div>
        <br>
        <div>
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" placeholder="ejemplo@correo.com">
        </div>
        <br>
        <div>
            <label for="password">Contraseña:</label><br>
            <input type="password" id="password" name="password" placeholder="Elegí una contraseña">
        </div>
        <br>
        <div>
            <label for="confirmar">Confirmar contraseña:</label><br>
            <input type="password" id="confirmar" name="confirmar" placeholder="Repetí tu contraseña">
        </div>
        <br>
        <button type="submit">Registrarse</button>
        <p>¿Ya tenes cuenta? <a href="ej2.html">Inicia sesion</a></p>
    </form>

</body>
</html>
